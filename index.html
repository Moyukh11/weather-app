<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <!-- SEARCH -->
      <div class="top">
        <input type="text" id="searchInput" placeholder="Search city..." />
      </div>

      <!-- CITY -->
      <p id="city">Kolkata</p>

      <!-- ICON -->
      <div class="icon">
        <img id="weatherIcon" src="assets/icons/clear.png" />
      </div>

      <!-- TEMP -->
      <h1 id="temp">--°</h1>
      <p id="desc">Loading...</p>

      <!-- INFO -->
      <div class="info">
        <div>
          <p>Wind</p>
          🌬️ <span id="wind">--</span>
        </div>
        <div>
          <p>Humidity</p>
          💧 <span id="humidity">--</span>
        </div>
        <div>
          <p>Sunlight</p>
          ☀️ <span id="sun">8 hr</span>
        </div>
      </div>

      <div class="hourly-section">
  <h3>Hourly Forecast</h3>
  <div class="hourly" id="hourly"></div>
</div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
